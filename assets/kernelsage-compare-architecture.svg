<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">历史对比与相似线索结构框图</title>
<desc id="desc">展示目标画像、历史画像、选择评分、比较流程、相似线索和报告边界。</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#2f855a"/></marker>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 36px "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans SC", "Noto Sans CJK SC", SimHei, Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .subtitle { font: 400 18px "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans SC", "Noto Sans CJK SC", SimHei, Arial, sans-serif; fill: #475569; text-anchor: middle; }
      .box-title { font: 700 19px "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans SC", "Noto Sans CJK SC", SimHei, Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 15px "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans SC", "Noto Sans CJK SC", SimHei, Arial, sans-serif; fill: #334155; }
      .small { font: 400 13px "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans SC", "Noto Sans CJK SC", SimHei, Arial, sans-serif; fill: #475569; }
      .tag { font: 700 13px "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans SC", "Noto Sans CJK SC", SimHei, Arial, sans-serif; fill: #fff; text-anchor: middle; }
      .node { stroke-width: 1.6; rx: 8; filter: url(#soft-shadow); }
      .line { fill: none; stroke: #334155; stroke-width: 2.4; marker-end: url(#arrow); }
      .line-soft { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrow); }
      .line-dash { fill: none; stroke: #7c3aed; stroke-width: 2; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .line-green { fill: none; stroke: #2f855a; stroke-width: 2.4; marker-end: url(#arrow-green); }
    </style>
  </defs>

<rect class="bg" width="1600" height="900"/>
<text class="title" x="800" y="54">历史对比与相似线索结构框图</text>
<text class="subtitle" x="800" y="84">先按画像相似度选择 Top N，再把功能重合和代码级线索作为人工复核入口</text>
<rect class="node" x="55" y="150" width="310" height="165" rx="8" fill="#e9f7ef" stroke="#8fc9a8"/>
<text class="box-title" x="79" y="184">待分析作品画像</text>
<text class="body" x="79" y="212">
<tspan x="79" dy="0">Target KernelProfile</tspan>
<tspan x="79" dy="23">OS 维度、语言、架构、规模</tspan>
<tspan x="79" dy="23">源码 evidence</tspan>
</text>
<rect class="node" x="55" y="430" width="310" height="165" rx="8" fill="#ecfeff" stroke="#67c7d4"/>
<text class="box-title" x="79" y="464">历史画像缓存</text>
<text class="body" x="79" y="492">
<tspan x="79" dy="0">141 个历史样本画像</tspan>
<tspan x="79" dy="23">data/profiles/*.json</tspan>
<tspan x="79" dy="23">manifest 来源信息</tspan>
</text>
<rect class="node" x="435" y="132" width="730" height="100" rx="8" fill="#ffffff" stroke="#8bb8e8"/>
<text class="box-title" x="459" y="166">selector.py 候选样本评分</text>
<text class="body" x="459" y="194">
<tspan x="459" dy="0">style / arch / language / dimension / size / source_tier</tspan>
<tspan x="459" dy="23">避免按目录顺序截断，优先选择技术路线接近样本</tspan>
</text>
<rect class="node" x="435" y="274" width="730" height="84" rx="8" fill="#ffffff" stroke="#8fc9a8"/>
<text class="box-title" x="459" y="308">Top N 历史样本</text>
<text class="body" x="459" y="336">
<tspan x="459" dy="0">默认选择最有代表性的历史样本集合，并保留选择理由</tspan>
</text>
<rect class="node" x="435" y="400" width="730" height="100" rx="8" fill="#ffffff" stroke="#f0bd6a"/>
<text class="box-title" x="459" y="434">agent.py 比较流程</text>
<text class="body" x="459" y="462">
<tspan x="459" dy="0">比较 OS 维度覆盖、证据路径、符号、结构体/宏和局部片段</tspan>
<tspan x="459" dy="23">把相似点、差异点和风险提示组织为 CompareResult</tspan>
</text>
<rect class="node" x="435" y="542" width="730" height="104" rx="8" fill="#ffffff" stroke="#b99be6"/>
<text class="box-title" x="459" y="576">相似线索分层</text>
<text class="body" x="459" y="604">
<tspan x="459" dy="0">功能重合：解决的问题或 OS 机制接近</tspan>
<tspan x="459" dy="23">代码级线索：路径、符号、类型、宏、片段相似度</tspan>
</text>
<rect class="node" x="435" y="760" width="730" height="82" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
<text class="box-title" x="459" y="794">输出边界</text>
<text class="body" x="459" y="822">
<tspan x="459" dy="0">CompareResult -&gt; 比较报告；代码级线索不是抄袭裁定，只是人工复核入口</tspan>
</text>
<rect class="node" x="1225" y="160" width="320" height="225" rx="8" fill="#fff7e8" stroke="#f0bd6a"/>
<text class="box-title" x="1249" y="194">比较报告内容</text>
<text class="body" x="1249" y="222">
<tspan x="1249" dy="0">Top N 选择理由</tspan>
<tspan x="1249" dy="23">相似点 / 差异点</tspan>
<tspan x="1249" dy="23">可能创新点</tspan>
<tspan x="1249" dy="23">疑似重复线索</tspan>
<tspan x="1249" dy="23">人工复核建议</tspan>
</text>
<rect class="node" x="1225" y="455" width="320" height="175" rx="8" fill="#fff1f2" stroke="#f3a6ad"/>
<text class="box-title" x="1249" y="489">风险控制</text>
<text class="body" x="1249" y="517">
<tspan x="1249" dy="0">不自动判抄袭</tspan>
<tspan x="1249" dy="23">不做绝对创新裁定</tspan>
<tspan x="1249" dy="23">提示样本库覆盖边界</tspan>
</text>
<line class="line" x1="365" y1="232" x2="428" y2="180"/>
<line class="line-green" x1="365" y1="512" x2="428" y2="180"/>
<line class="line" x1="800" y1="232" x2="800" y2="273"/>
<line class="line" x1="800" y1="358" x2="800" y2="399"/>
<line class="line" x1="800" y1="500" x2="800" y2="541"/>
<line class="line" x1="800" y1="646" x2="800" y2="755"/>
<line class="line" x1="1165" y1="442" x2="1218" y2="270"/>
<line class="line-dash" x1="1165" y1="594" x2="1218" y2="540"/>
</svg>
