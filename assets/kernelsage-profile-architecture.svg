<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">仓库画像生成结构框图</title>
<desc id="desc">collector、parser、analyzer 将源码仓库转换为 KernelProfile。</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#2f855a"/></marker>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 36px "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans SC", "Noto Sans CJK SC", SimHei, Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .subtitle { font: 400 18px "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans SC", "Noto Sans CJK SC", SimHei, Arial, sans-serif; fill: #475569; text-anchor: middle; }
      .box-title { font: 700 19px "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans SC", "Noto Sans CJK SC", SimHei, Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 15px "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans SC", "Noto Sans CJK SC", SimHei, Arial, sans-serif; fill: #334155; }
      .small { font: 400 13px "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans SC", "Noto Sans CJK SC", SimHei, Arial, sans-serif; fill: #475569; }
      .tag { font: 700 13px "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans SC", "Noto Sans CJK SC", SimHei, Arial, sans-serif; fill: #fff; text-anchor: middle; }
      .node { stroke-width: 1.6; rx: 8; filter: url(#soft-shadow); }
      .line { fill: none; stroke: #334155; stroke-width: 2.4; marker-end: url(#arrow); }
      .line-soft { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrow); }
      .line-dash { fill: none; stroke: #7c3aed; stroke-width: 2; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .line-green { fill: none; stroke: #2f855a; stroke-width: 2.4; marker-end: url(#arrow-green); }
    </style>
  </defs>

<rect class="bg" width="1600" height="900"/>
<text class="title" x="800" y="54">仓库画像生成结构框图</text>
<text class="subtitle" x="800" y="84">把 OS 仓库转为可复核的 KernelProfile，后续报告、对比和检索共用同一证据基础</text>
<rect class="node" x="55" y="145" width="310" height="210" rx="8" fill="#e9f7ef" stroke="#8fc9a8"/>
<rect x="79" y="167" width="172" height="38" rx="8" fill="#2f855a"/>
<text class="tag" x="165.0" y="191.0">OS Repo</text>
<text class="box-title" x="79" y="239">输入仓库</text>
<text class="body" x="79" y="267">
<tspan x="79" dy="0">源码文件、README/docs</tspan>
<tspan x="79" dy="23">构建脚本与目录结构</tspan>
<tspan x="79" dy="23">Rust / C / C++ / Assembly</tspan>
</text>
<rect class="node" x="55" y="410" width="310" height="210" rx="8" fill="#ecfeff" stroke="#67c7d4"/>
<text class="box-title" x="79" y="444">证据保真</text>
<text class="body" x="79" y="472">
<tspan x="79" dy="0">过滤 build / deps / cache</tspan>
<tspan x="79" dy="23">保留 path + line + snippet</tspan>
<tspan x="79" dy="23">结论只引用可回溯源码</tspan>
</text>
<rect class="node" x="435" y="145" width="730" height="82" rx="8" fill="#ffffff" stroke="#8bb8e8"/>
<text class="box-title" x="459" y="179">collector.py 仓库采集</text>
<text class="body" x="459" y="207">
<tspan x="459" dy="0">生成 RepoSnapshot</tspan>
<tspan x="459" dy="23">语言分布 / 文档 / 构建入口 / 文件规模</tspan>
</text>
<rect class="node" x="435" y="255" width="730" height="82" rx="8" fill="#ffffff" stroke="#8fc9a8"/>
<text class="box-title" x="459" y="289">parser.py 符号解析</text>
<text class="body" x="459" y="317">
<tspan x="459" dy="0">提取函数、结构体、类、宏、impl、汇编符号</tspan>
<tspan x="459" dy="23">形成候选 evidence</tspan>
</text>
<rect class="node" x="435" y="365" width="730" height="82" rx="8" fill="#ffffff" stroke="#f0bd6a"/>
<text class="box-title" x="459" y="399">analyzer.py 机制识别</text>
<text class="body" x="459" y="427">
<tspan x="459" dy="0">启动、内存、调度、系统调用、文件系统</tspan>
<tspan x="459" dy="23">中断、驱动、同步等 OS 维度</tspan>
</text>
<rect class="node" x="435" y="475" width="730" height="82" rx="8" fill="#ffffff" stroke="#b99be6"/>
<text class="box-title" x="459" y="509">KernelProfile 结构化画像</text>
<text class="body" x="459" y="537">
<tspan x="459" dy="0">meta / dimensions / evidence / symbols</tspan>
<tspan x="459" dy="23">被报告、对比、检索和缓存共同复用</tspan>
</text>
<rect class="node" x="1225" y="145" width="320" height="250" rx="8" fill="#fff7e8" stroke="#f0bd6a"/>
<text class="box-title" x="1249" y="179">下游复用</text>
<text class="body" x="1249" y="207">
<tspan x="1249" dy="0">reporter.py 生成描述报告</tspan>
<tspan x="1249" dy="23">selector.py 选择历史样本</tspan>
<tspan x="1249" dy="23">query-evidence 反向检索</tspan>
<tspan x="1249" dy="23">profile_cache.py 缓存画像</tspan>
</text>
<rect class="node" x="1225" y="450" width="320" height="170" rx="8" fill="#fff1f2" stroke="#f3a6ad"/>
<text class="box-title" x="1249" y="484">画像输出边界</text>
<text class="body" x="1249" y="512">
<tspan x="1249" dy="0">不是全文查重结果</tspan>
<tspan x="1249" dy="23">不是自动抄袭裁定</tspan>
<tspan x="1249" dy="23">是可复核的 OS 语义证据</tspan>
</text>
<rect class="node" x="435" y="760" width="730" height="82" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
<text class="box-title" x="459" y="794">数据模型流转</text>
<text class="body" x="459" y="822">
<tspan x="459" dy="0">RepoSnapshot -&gt; Symbol[] -&gt; DimensionEvidence -&gt; KernelProfile</tspan>
</text>
<line class="line" x1="365" y1="250" x2="428" y2="186"/>
<line class="line" x1="800" y1="227" x2="800" y2="255"/>
<line class="line" x1="800" y1="337" x2="800" y2="365"/>
<line class="line" x1="800" y1="447" x2="800" y2="475"/>
<line class="line" x1="1165" y1="559" x2="1218" y2="255"/>
<line class="line-soft" x1="365" y1="515" x2="428" y2="405"/>
<line class="line-soft" x1="800" y1="667" x2="800" y2="755"/>
<line class="line-dash" x1="1225" y1="532" x2="1172" y2="592"/>
</svg>
