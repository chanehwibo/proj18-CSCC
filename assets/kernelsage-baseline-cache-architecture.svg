<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">历史样本库与画像缓存结构框图</title>
<desc id="desc">展示历史样本来源、manifest、审计、拉取、本地样本目录、画像缓存和输出复用。</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#2f855a"/></marker>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 36px "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans SC", "Noto Sans CJK SC", SimHei, Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .subtitle { font: 400 18px "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans SC", "Noto Sans CJK SC", SimHei, Arial, sans-serif; fill: #475569; text-anchor: middle; }
      .box-title { font: 700 19px "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans SC", "Noto Sans CJK SC", SimHei, Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 15px "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans SC", "Noto Sans CJK SC", SimHei, Arial, sans-serif; fill: #334155; }
      .small { font: 400 13px "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans SC", "Noto Sans CJK SC", SimHei, Arial, sans-serif; fill: #475569; }
      .tag { font: 700 13px "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans SC", "Noto Sans CJK SC", SimHei, Arial, sans-serif; fill: #fff; text-anchor: middle; }
      .node { stroke-width: 1.6; rx: 8; filter: url(#soft-shadow); }
      .line { fill: none; stroke: #334155; stroke-width: 2.4; marker-end: url(#arrow); }
      .line-soft { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrow); }
      .line-dash { fill: none; stroke: #7c3aed; stroke-width: 2; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .line-green { fill: none; stroke: #2f855a; stroke-width: 2.4; marker-end: url(#arrow-green); }
    </style>
  </defs>

<rect class="bg" width="1600" height="900"/>
<text class="title" x="800" y="54">历史样本库与画像缓存结构框图</text>
<text class="subtitle" x="800" y="84">141 个历史样本按来源分级管理，画像缓存让后续 compare 避免重复扫描全部仓库</text>
<rect class="node" x="55" y="132" width="310" height="260" rx="8" fill="#e9f7ef" stroke="#8fc9a8"/>
<rect x="79" y="154" width="190" height="38" rx="8" fill="#2f855a"/>
<text class="tag" x="174.0" y="178.0">Sources</text>
<text class="box-title" x="79" y="226">样本来源</text>
<text class="body" x="79" y="254">
<tspan x="79" dy="0">教学基线 / 架构参考</tspan>
<tspan x="79" dy="23">比赛作品样本 / 已核验获奖案例</tspan>
<tspan x="79" dy="23">赛事组 collected-data 成功 120 条</tspan>
<tspan x="79" dy="23">失败 48 条写入导入说明</tspan>
</text>
<rect class="node" x="55" y="465" width="310" height="165" rx="8" fill="#fff1f2" stroke="#f3a6ad"/>
<text class="box-title" x="79" y="499">来源边界</text>
<text class="body" x="79" y="527">
<tspan x="79" dy="0">source_tier 区分样本类型</tspan>
<tspan x="79" dy="23">verified_award 才能称获奖案例</tspan>
<tspan x="79" dy="23">manifest-audit 检查 repo_id 安全</tspan>
</text>
<rect class="node" x="435" y="132" width="730" height="84" rx="8" fill="#ffffff" stroke="#8bb8e8"/>
<text class="box-title" x="459" y="166">data/samples/manifest.json</text>
<text class="body" x="459" y="194">
<tspan x="459" dy="0">记录 repo_id、名称、来源、类别、仓库地址、本地路径和奖项来源</tspan>
</text>
<rect class="node" x="435" y="258" width="730" height="84" rx="8" fill="#ffffff" stroke="#8fc9a8"/>
<text class="box-title" x="459" y="292">manifest_audit.py 样本库可信度审计</text>
<text class="body" x="459" y="320">
<tspan x="459" dy="0">检查路径越界、来源字段、奖项信息、本地目录和 HEAD 元数据</tspan>
</text>
<rect class="node" x="435" y="384" width="730" height="84" rx="8" fill="#ffffff" stroke="#f0bd6a"/>
<text class="box-title" x="459" y="418">fetch_repos.py / 本地样本目录</text>
<text class="body" x="459" y="446">
<tspan x="459" dy="0">按 manifest 拉取或复用 data/samples/&lt;repo_id&gt;/，失败项不进入正式基线</tspan>
</text>
<rect class="node" x="435" y="510" width="730" height="100" rx="8" fill="#ffffff" stroke="#b99be6"/>
<text class="box-title" x="459" y="544">ProfileCache 画像缓存</text>
<text class="body" x="459" y="572">
<tspan x="459" dy="0">计算仓库 fingerprint，命中则直接读取 data/profiles/*.json</tspan>
<tspan x="459" dy="23">未命中或强制刷新时才重建 KernelProfile</tspan>
</text>
<rect class="node" x="435" y="760" width="730" height="82" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
<text class="box-title" x="459" y="794">复用出口</text>
<text class="body" x="459" y="822">
<tspan x="459" dy="0">selector.py Top N 选择 / baseline.html 样本展示 / docs 导入说明 / 报告样例</tspan>
</text>
<rect class="node" x="1225" y="155" width="320" height="210" rx="8" fill="#fff7e8" stroke="#f0bd6a"/>
<text class="box-title" x="1249" y="189">评审可解释性</text>
<text class="body" x="1249" y="217">
<tspan x="1249" dy="0">样本数量可追溯</tspan>
<tspan x="1249" dy="23">失败记录不伪装成功</tspan>
<tspan x="1249" dy="23">获奖标签有来源约束</tspan>
<tspan x="1249" dy="23">本地缓存可重复复核</tspan>
</text>
<rect class="node" x="1225" y="455" width="320" height="175" rx="8" fill="#ecfeff" stroke="#67c7d4"/>
<text class="box-title" x="1249" y="489">性能收益</text>
<text class="body" x="1249" y="517">
<tspan x="1249" dy="0">输入新作品时主要扫描新仓库</tspan>
<tspan x="1249" dy="23">历史样本读取缓存画像</tspan>
<tspan x="1249" dy="23">Top N 选择更快更稳定</tspan>
</text>
<line class="line" x1="365" y1="255" x2="428" y2="174"/>
<line class="line" x1="800" y1="216" x2="800" y2="257"/>
<line class="line" x1="800" y1="342" x2="800" y2="383"/>
<line class="line" x1="800" y1="468" x2="800" y2="509"/>
<line class="line" x1="800" y1="610" x2="800" y2="755"/>
<line class="line-soft" x1="365" y1="545" x2="428" y2="300"/>
<line class="line" x1="1165" y1="174" x2="1218" y2="255"/>
<line class="line-green" x1="1165" y1="560" x2="1218" y2="535"/>
</svg>
